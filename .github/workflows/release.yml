name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches plugin versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          HEADER_VERSION="$(grep -m1 -E '^ \* Version:' maestro-menu-editor.php | sed -E 's/.*Version:[[:space:]]*//')"
          STABLE_TAG="$(grep -m1 -E '^Stable tag:' readme.txt | sed -E 's/^Stable tag:[[:space:]]*//')"
          test "$VERSION" = "$HEADER_VERSION"
          test "$VERSION" = "$STABLE_TAG"

      - name: Build release zip
        run: bash bin/build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/maestro-menu-editor.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
