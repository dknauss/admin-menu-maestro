name: Deploy to WordPress.org

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy (e.g. v1.1.1). Leave blank when triggered by a release."
        required: false
        default: ""
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: wporg-deploy-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to WordPress.org SVN
    runs-on: ubuntu-latest

    steps:
      # Resolve which ref/version to ship. On a release event the tag comes from
      # github.ref_name; on manual dispatch it comes from the `tag` input. This
      # lets us deploy a tag whose commit predates these workflows (e.g. 1.0.0),
      # since the workflow file itself is read from the dispatched ref (main).
      - name: Resolve ref + version
        id: meta
        run: |
          REF="${{ github.event.inputs.tag }}"
          [ -z "$REF" ] && REF="${{ github.ref_name }}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout ${{ steps.meta.outputs.ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Verify deploy version
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          HEADER_VERSION="$(grep -m1 -E '^ \* Version:' maestro-menu-editor.php | sed -E 's/.*Version:[[:space:]]*//')"
          STABLE_TAG="$(grep -m1 -E '^Stable tag:' readme.txt | sed -E 's/^Stable tag:[[:space:]]*//')"
          test "$VERSION" = "$HEADER_VERSION"
          test "$VERSION" = "$STABLE_TAG"

      # No build toolchain: the runtime is plain PHP/JS/CSS. bin/build.sh
      # assembles the exact shippable tree under build/maestro-menu-editor.
      - name: Build runtime tree
        run: bash bin/build.sh

      - name: Stage WordPress.org assets
        run: |
          mkdir -p build/wporg-assets
          rsync -a .wordpress-org/ build/wporg-assets/ \
            --exclude '.DS_Store' \
            --exclude 'source/'

      - name: WordPress.org plugin deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WP_ORG_SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WP_ORG_SVN_PASSWORD }}
          SLUG: maestro-menu-editor
          VERSION: ${{ steps.meta.outputs.version }}
          BUILD_DIR: build/maestro-menu-editor
          ASSETS_DIR: build/wporg-assets
