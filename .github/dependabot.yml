version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Edmonton
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - php

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "10:30"
      timezone: America/Edmonton
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "11:00"
      timezone: America/Edmonton
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
